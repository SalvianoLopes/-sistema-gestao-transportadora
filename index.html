<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Gestão Operacional — Transportadora</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080f;--sur:#0d1017;--s2:#141824;--s3:#1a2030;
  --b1:#ffffff0d;--b2:#ffffff18;--b3:#ffffff28;
  --red:#e8195a;--red2:#ff2d6e;--rbg:#e8195a18;--rglow:#e8195a30;
  --grn:#00d68f;--gbg:#00d68f15;--gglow:#00d68f25;
  --yel:#f5a623;--ybg:#f5a62315;
  --blu:#4d9fff;--bbg:#4d9fff15;
  --t1:#f0f2ff;--t2:#9ba3c0;--t3:#4a5270;
  --r:10px;--rs:7px;
}
body{background:var(--bg);color:var(--t1);font-family:Inter,sans-serif;min-height:100vh;font-size:14px}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#fff3;border-radius:4px}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sur);border-bottom:1px solid var(--b2);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 0 16px var(--rglow)}
.logo-text{font-size:15px;font-weight:700}
.logo-sub{font-size:10px;color:var(--t3);margin-top:1px}
.nav{background:var(--sur);border-bottom:1px solid var(--b1);display:flex;overflow-x:auto;padding:0 20px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:14px 15px;font-size:11px;font-weight:600;color:var(--t3);background:transparent;border:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;font-family:Inter,sans-serif}
.nav-btn:hover{color:var(--t2)}
.nav-btn.on{color:var(--red);border-bottom-color:var(--red)}
.main{padding:24px;max-width:1400px;margin:0 auto;width:100%}
/* INPUTS BRANCOS */
input,select,textarea{
  background:#ffffff !important;color:#111827 !important;
  color-scheme:light !important;border:1.5px solid #d1d5db !important;
  border-radius:var(--rs) !important;padding:8px 11px !important;
  font-size:13px !important;font-family:Inter,sans-serif !important;
  width:100%;transition:border-color .18s;
}
input:focus,select:focus,textarea:focus{outline:none !important;border-color:var(--red) !important;box-shadow:0 0 0 3px var(--rbg) !important}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;filter:none;opacity:.7}
select option{background:#fff;color:#111827}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.lbl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);margin-bottom:5px}
.fg{margin-bottom:13px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-size:12px;font-weight:700;letter-spacing:.3px;cursor:pointer;border:none;transition:all .18s;text-transform:uppercase;font-family:Inter,sans-serif;white-space:nowrap}
.btn-r{background:var(--red);color:#fff;box-shadow:0 4px 14px var(--rglow)}
.btn-r:hover{background:var(--red2);transform:translateY(-1px)}
.btn-o{background:transparent;border:1.5px solid var(--b2) !important;color:var(--t2);width:auto !important}
.btn-o:hover{border-color:var(--b3) !important;color:var(--t1)}
.btn-g{background:var(--gbg);border:1px solid var(--gglow) !important;color:var(--grn);width:auto !important}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-xs{padding:4px 9px;font-size:10px}
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px;margin-bottom:20px}
.kc{background:var(--sur);border:1px solid var(--b2);border-radius:var(--r);padding:15px;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kc.r::after{background:var(--red)}.kc.g::after{background:var(--grn)}.kc.b::after{background:var(--blu)}.kc.y::after{background:var(--yel)}
.kl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:7px}
.kv{font-size:25px;font-weight:800;letter-spacing:-1px;line-height:1;font-family:"JetBrains Mono",monospace}
.kc.r .kv{color:var(--red)}.kc.g .kv{color:var(--grn)}.kc.b .kv{color:var(--blu)}.kc.y .kv{color:var(--yel)}
.ks{font-size:10px;color:var(--t3);margin-top:5px}
.card{background:var(--sur);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden}
.ch{padding:13px 17px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--b2)}
th{padding:9px 11px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--b1);transition:background .12s}
tbody tr:hover{background:var(--s2)}
td{padding:9px 11px;color:var(--t2);white-space:nowrap}
td.b{color:var(--t1);font-weight:600}
td.m{font-family:"JetBrains Mono",monospace;font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}
.bg{background:var(--gbg);color:var(--grn);border:1px solid var(--gglow)}
.br{background:var(--rbg);color:var(--red);border:1px solid var(--rglow)}
.by{background:var(--ybg);color:var(--yel);border:1px solid #f5a62325}
.bb{background:var(--bbg);color:var(--blu);border:1px solid #4d9fff25}
.bk{background:var(--s3);color:var(--t3);border:1px solid var(--b2)}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.st{font-size:22px;font-weight:800;letter-spacing:-.5px}
.st span{color:var(--red)}
.ss{font-size:11px;color:var(--t3);margin-top:3px}
.fb{background:var(--sur);border:1px solid var(--b2);border-radius:var(--r);padding:12px 15px;margin-bottom:17px;display:flex;gap:13px;flex-wrap:wrap;align-items:flex-end}
.fg2{display:flex;flex-direction:column;gap:4px}
.fg2 .lbl{margin-bottom:0}
.fg2 input,.fg2 select{width:auto;min-width:130px}
.ov{position:fixed;inset:0;background:#000b;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.mod{background:var(--sur);border:1px solid var(--b2);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.mh{padding:17px 21px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sur);z-index:1}
.mt{font-size:15px;font-weight:700}
.mb{padding:20px 21px}
.mf{padding:13px 21px;border-top:1px solid var(--b1);display:flex;gap:10px;justify-content:flex-end}
.al{padding:10px 13px;border-radius:var(--rs);display:flex;gap:8px;margin-bottom:10px;font-size:12px;align-items:flex-start}
.al-r{background:var(--rbg);border:1px solid var(--rglow);color:var(--red)}
.al-g{background:var(--gbg);border:1px solid var(--gglow);color:var(--grn)}
.al-b{background:var(--bbg);border:1px solid #4d9fff25;color:var(--blu)}
.al-y{background:var(--ybg);border:1px solid #f5a62325;color:var(--yel)}
.dv{height:1px;background:var(--b1);margin:12px 0}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px;color:var(--t3);gap:9px}
.lding{display:flex;align-items:center;justify-content:center;padding:36px;gap:10px;color:var(--t3);font-size:13px}
.sp{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;z-index:300;background:var(--grn);color:#000;padding:11px 20px;border-radius:var(--rs);font-size:13px;font-weight:700;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--red);color:#fff}
.mk{background:var(--s2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 14px;flex:none}
.dr{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:50;background:#fff;border:1.5px solid #d1d5db;border-radius:var(--rs);max-height:200px;overflow-y:auto;box-shadow:0 8px 24px #00000030}
.di{padding:9px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f0f2f8;color:#111}
.di:hover{background:#f5f7ff}
.di:last-child{border-bottom:none}
.di-n{font-weight:600}
.di-s{font-size:10px;color:#667;margin-top:1px}
@media(max-width:768px){.main{padding:14px}.r2,.r3{grid-template-columns:1fr}.kg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"><div class="lding"><div class="sp"></div>Carregando...</div></div>
<div id="toast" class="toast"></div>
<script>
// ══════════════════════════════════════════════
// API SUPABASE — FETCH DIRETO (sem CDN externo)
// ══════════════════════════════════════════════
const SURL = 'https://pneakxdlbyuysjorhjdu.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZWFreGRsYnl1eXNqb3JoamR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTMwODIsImV4cCI6MjA5MjEyOTA4Mn0.U43ri8NtZVuxGANrslQ1GQTZ_hnNJ4dtAYCR9xMNTHk';
const HDR = {'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'};

const db = {
  async get(table, filters={}, opts={}) {
    const url = new URL(`${SURL}/rest/v1/${table}`);
    url.searchParams.set('select', opts.select || '*');
    Object.entries(filters).forEach(([k,v]) => {
      if (typeof v === 'object' && v.op) url.searchParams.set(k, `${v.op}.${v.val}`);
      else url.searchParams.set(k, `eq.${v}`);
    });
    if (opts.order) url.searchParams.set('order', opts.order);
    if (opts.ilike) Object.entries(opts.ilike).forEach(([k,v]) => url.searchParams.set(k, `ilike.*${v}*`));
    if (opts.limit) url.searchParams.set('limit', opts.limit);
    const r = await fetch(url.toString(), {headers: HDR});
    if (!r.ok) throw new Error(`DB ${r.status}: ${await r.text()}`);
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SURL}/rest/v1/${table}`, {method:'POST',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify(data)});
    if (!r.ok) throw new Error(await r.text());
  },
  async patch(table, id, data) {
    const r = await fetch(`${SURL}/rest/v1/${table}?id=eq.${id}`, {method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify(data)});
    if (!r.ok) throw new Error(await r.text());
  },
  async patchWhere(table, col, val, data) {
    const r = await fetch(`${SURL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`, {method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify(data)});
    if (!r.ok) throw new Error(await r.text());
  }
};

// ══════════════════════════════════════════════
// REACT
// ══════════════════════════════════════════════
const {createElement:h,useState,useEffect,useMemo} = React;
const fmt=(n,d=0)=>n!=null?Number(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}):'0';
const R=n=>`R$ ${fmt(n||0,2)}`;
const iso=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const fd=d=>{if(!d)return'—';const s=d.includes('T')?d.split('T')[0]:d;const[y,m,dd]=s.split('-');return`${dd}/${m}/${y}`};
const dstr=()=>new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
let _tt;
function toast(msg,t='ok'){const el=document.getElementById('toast');if(!el)return;el.textContent=(t==='ok'?'✓ ':'✕ ')+msg;el.className='toast show'+(t==='err'?' err':'');clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',3200)}

const Ldg=()=>h('div',{className:'lding'},h('div',{className:'sp'}),'Carregando...');
const Emp=({i='📭',t='Sem dados'})=>h('div',{className:'emp'},h('div',{style:{fontSize:36,opacity:.3}},i),h('div',null,t));

const Bs=({s})=>{
  const M={'ATIVO':['bg','● Ativo'],'MANUTENCAO':['by','🔧 Manut.'],'PE':['bb','📋 PE'],'AGUARDANDO_PECA':['br','⏳ Aguard.'],'LIBERADO':['bb','✓ Lib.'],'DESLIGADO':['bk','✕ Deslig.'],'JUSTA_CAUSA':['br','⚠ J.Causa'],'AFASTADO':['by','~ Afastado'],'1ª Saída':['bg','1ª Saída'],'Recarga':['br','⟳ Recarga'],'MOTORISTA':['bb','Motorista'],'AJUDANTE':['bg','Ajudante'],'COORDENADOR':['br','Coord.'],'ADM':['bk','ADM'],'VAN':['bb','VAN'],'VUC':['bg','VUC']};
  const[c,l]=M[s]||['bk',s||'—'];return h('span',{className:`badge ${c}`},l)
};
const Ob=({o})=>{if(!o)return h('span',{style:{color:'var(--t3)'}},'—');if(o.includes('1ª'))return h('span',{className:'badge bb'},'1ª Onda');if(o.includes('2ª'))return h('span',{className:'badge bg'},'2ª Onda');return h('span',{className:'badge by'},'3ª Onda')};

/* DASHBOARD */
function Dashboard(){
  const[d,setD]=useState(null);const[ld,setLd]=useState(true);const[mes,setMes]=useState('2026-04');const[err,setErr]=useState(null);
  useEffect(()=>{load()},[mes]);
  async function load(){
    setLd(true);setErr(null);
    try{
      const ini=`${mes}-01`,fim=`${mes}-31`;
      const[s,rc,fr,eq,vds]=await Promise.all([
        db.get('entrada_diaria',{data:{op:'gte',val:ini}},{order:'data.asc'}).then(r=>r.filter(x=>x.data<=fim&&x.status_operacional==='1ª Saída')),
        db.get('entrada_diaria',{data:{op:'gte',val:ini}},{order:'data.asc'}).then(r=>r.filter(x=>x.data<=fim&&x.status_operacional==='Recarga')),
        db.get('frota',{},{select:'status'}),
        db.get('equipe',{},{select:'status'}),
        db.get('vendas_diarias',{},{order:'data.asc'}).then(r=>r.filter(x=>x.data>=ini&&x.data<=fim)),
      ]);
      const mm={};
      s.forEach(x=>{if(!x.motorista_nome)return;if(!mm[x.motorista_nome])mm[x.motorista_nome]={n:0,cx:0,km:0,cl:0};mm[x.motorista_nome].n++;mm[x.motorista_nome].cx+=x.qtd_caixas||0;mm[x.motorista_nome].km+=x.km||0;mm[x.motorista_nome].cl+=x.num_clientes||0});
      setD({cx:s.reduce((a,r)=>a+(r.qtd_caixas||0),0),cl:s.reduce((a,r)=>a+(r.num_clientes||0),0),km:s.reduce((a,r)=>a+(r.km||0),0),vd:(vds||[]).reduce((a,r)=>a+parseFloat(r.venda_total||0),0),dias:new Set(s.map(r=>r.data)).size,rec:rc.reduce((a,r)=>a+(r.valor_motorista||0)+(r.valor_ajudante1||0)+(r.valor_ajudante2||0),0),fa:fr.filter(f=>f.status==='ATIVO').length,fm:fr.filter(f=>f.status!=='ATIVO').length,et:eq.filter(e=>e.status==='ATIVO').length,mots:Object.entries(mm).sort((a,b)=>b[1].cx-a[1].cx).slice(0,8)});
    }catch(e){console.error(e);setErr('Erro: '+e.message)}
    setLd(false);
  }
  if(ld)return h(Ldg);
  return h('div',null,
    h('div',{className:'sh'},
      h('div',null,h('h1',{className:'st'},'Dashboard ',h('span',null,'Operacional')),h('div',{className:'ss'},dstr())),
      h('div',{className:'fg2'},h('label',{className:'lbl'},'Mês'),h('select',{value:mes,onChange:e=>setMes(e.target.value),style:{width:150}},h('option',{value:'2026-04'},'Abril 2026'),h('option',{value:'2026-03'},'Março 2026'),h('option',{value:'2026-05'},'Maio 2026')))
    ),
    err&&h('div',{className:'al al-r'},'⚠ '+err),
    d&&h('div',null,
      h('div',{className:'kg'},
        h('div',{className:'kc r'},h('div',{className:'kl'},'Total Caixas'),h('div',{className:'kv'},fmt(d.cx)),h('div',{className:'ks'},`${d.dias} dias`)),
        h('div',{className:'kc g'},h('div',{className:'kl'},'Clientes'),h('div',{className:'kv'},fmt(d.cl))),
        h('div',{className:'kc b'},h('div',{className:'kl'},'KM Rodados'),h('div',{className:'kv'},fmt(d.km))),
        h('div',{className:'kc r'},h('div',{className:'kl'},'Total Vendas'),h('div',{className:'kv',style:{fontSize:18}},R(d.vd))),
        h('div',{className:'kc g'},h('div',{className:'kl'},'Frota Ativa'),h('div',{className:'kv'},d.fa),h('div',{className:'ks'},`${d.fm} manut.`)),
        h('div',{className:'kc b'},h('div',{className:'kl'},'Equipe Ativa'),h('div',{className:'kv'},d.et)),
        h('div',{className:'kc y'},h('div',{className:'kl'},'Recargas Mês'),h('div',{className:'kv',style:{fontSize:18}},R(d.rec))),
      ),
      d.mots.length>0&&h('div',{className:'card'},
        h('div',{className:'ch'},h('span',{className:'ct'},'🏆 Produtividade — Motoristas')),
        h('div',{className:'tw'},h('table',null,
          h('thead',null,h('tr',null,h('th',null,'Motorista'),h('th',null,'Saídas'),h('th',null,'Caixas'),h('th',null,'Média'),h('th',null,'KM'),h('th',null,'Clientes'))),
          h('tbody',null,d.mots.map(([n,x],i)=>h('tr',{key:i},h('td',{className:'b'},n),h('td',{className:'m'},x.n),h('td',{className:'m'},fmt(x.cx)),h('td',{className:'m'},fmt(x.cx/Math.max(x.n,1))),h('td',{className:'m'},fmt(x.km)),h('td',{className:'m'},fmt(x.cl)))))
        ))
      )
    )
  )
}

/* LIBERAÇÕES */
function Liberacoes(){
  const[rows,setRows]=useState([]);const[ld,setLd]=useState(true);const[dt,setDt]=useState(iso());const[onda,setOnda]=useState('');const[mf,setMf]=useState('');const[mots,setMots]=useState([]);const[err,setErr]=useState(null);
  useEffect(()=>{load()},[dt,onda,mf]);

  function calcTempo(s,c){if(!s||!c)return'—';const[hs,ms]=s.split(':').map(Number);const[hc,mc]=c.split(':').map(Number);const d=(hc*60+mc)-(hs*60+ms);if(d<=0)return'—';return`${Math.floor(d/60)}h${String(d%60).padStart(2,'0')}m`}
  function fmtT(t){if(!t)return'—';return t.substring(0,5)}

  function expHorariosExcel(){
    if(!rows.length){toast('Sem dados','err');return}
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(rows.map(r=>({
      'Data':fd(r.data),'Placa':r.placa||'—','Tipo':r.tipo_veiculo||'—','Onda':r.onda||'—',
      'Motorista':r.motorista_nome||'—','Ajudante 1':r.ajudante1_nome||'—','Ajudante 2':r.ajudante2_nome||'—',
      'Rota':r.rota||'—','Tipo Saída':r.status_operacional||'—',
      'Saída':fmtT(r.horario_saida),'Chegada':fmtT(r.horario_chegada),'Tempo na Rua':calcTempo(r.horario_saida,r.horario_chegada),
      'Caixas':r.qtd_caixas||0,'Clientes':r.num_clientes||0,'KM':r.km||0,

  async function salvarVenda(){
    if(!vendaInput||parseFloat(vendaInput)<=0){toast('Digite o valor da venda','err');return}
    setSavingVenda(true);
    try{
      const val=parseFloat(vendaInput);
      if(vendaDia&&vendaDia.id){
        // UPDATE - usa fetch direto pois db.patch usa id
        const r=await fetch(`${SURL}/rest/v1/vendas_diarias?data=eq.${dt}`,
          {method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},
           body:JSON.stringify({venda_total:val,updated_at:new Date().toISOString()})});
        if(!r.ok)throw new Error(await r.text());
      }else{
        // INSERT
        await db.post('vendas_diarias',{data:dt,venda_total:val});
      }
      toast(`Venda do dia salva: R$ ${val.toLocaleString('pt-BR',{minimumFractionDigits:2})}`);
      loadVendaDia();
    }catch(e){toast('Erro: '+e.message,'err')}
    setSavingVenda(false);
  }

      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Auto-detectar linha do cabeçalho (pula linhas de título)
      let headerIdx=0;
      for(let i=0;i<Math.min(5,raw.length);i++){
        const r=raw[i].map(v=>String(v).trim().toUpperCase());
        if(r.includes('DATA')&&r.includes('MOTORISTA')){headerIdx=i;break;}
      }
      const headers=raw[headerIdx].map(h=>String(h).trim().toUpperCase());
      // Dados: linhas após cabeçalho, ignorar linha TOTAL e linhas vazias
      const dataRows=raw.slice(headerIdx+1).filter(r=>{
        const first=String(r[0]||'').trim().toUpperCase();
        return r.some(c=>c!=='')&&first!=='TOTAL'&&first!=='—'&&first!=='';
      });
      const col=(names)=>{for(const n of names){const i=headers.findIndex(h=>h.includes(n));if(i>=0)return i;}return -1;};
      const iData=col(['DATA']),iOnda=col(['ONDA']),iPlaca=col(['PLACA']),

        iCx=col(['CAIXAS','QTD']),iCl=col(['CLIENTE']),
        iKm=col(['KM']),iCub=col(['CUBAGEM','CUBOS','M3','M³']),

        if(!v)return dt;
        if(v instanceof Date){const d=v;return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
        const s=String(v).trim();
        if(/\d{2}\/\d{2}\/\d{4}/.test(s)){const[dd,mm,yyyy]=s.split('/');return`${yyyy}-${mm}-${dd}`}
        if(/\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
        return dt;
      };
      const tv=fr.reduce((m,f)=>{m[f.placa]=f.tipo;return m},{});
      let ok=0,erros=[];
      for(let i=0;i<dataRows.length;i++){
        const r=dataRows[i];
        const placa=iPlaca>=0?String(r[iPlaca]||'').trim().toUpperCase():'';
        const mot=iMot>=0?String(r[iMot]||'').trim().toUpperCase():'';
        if(!placa&&!mot)continue;
        try{
          const statusRaw=iStatus>=0?String(r[iStatus]||'').trim():'1ª Saída';
          const statusOk=statusRaw.toLowerCase().includes('recarga')?'Recarga':'1ª Saída';
          const ondaRaw=iOnda>=0?String(r[iOnda]||'').trim():'';

            km:iKm>=0?parseFloat(r[iKm])||0:0,
            total_venda:null,

            valor_ajudante2:ir&&aj2?(tipo==='VAN'||tv[placa]==='VAN'?50:60):0,
          });
          ok++;
        }catch(err){erros.push(`Linha ${i+2}: ${err.message}`);}
      }
      setImportResult({ok,erros,total:dataRows.length});
      if(ok>0)loadR();

  async function salvar(){

    if(F.status_operacional==='PE'&&!F.num_pe){toast('Nº da PE é obrigatório','err');return}

    if(F.status_operacional==='Recarga'&&F.valor_recarga_manual_ajudante&&parseFloat(F.valor_recarga_manual_ajudante)<=0){toast('Valor manual do ajudante deve ser maior que zero','err');return}
    setSaving(true);
    const tv2=fr.find(f=>f.placa===F.placa)?.tipo||'';
    const ir=F.status_operacional==='Recarga';
    const payload={
      ...F,tipo_veiculo:tv2,
      qtd_caixas:parseInt(F.qtd_caixas)||0,
      num_clientes:parseInt(F.num_clientes)||0,
      cubos:parseFloat(F.cubos)||0,
      km:parseFloat(F.km)||0,
      total_venda:null,
      venda_total_dia:parseFloat(F.venda_total_dia)||null,
      num_transporte:F.num_transporte?parseInt(F.num_transporte):null,
      cte:F.cte||null,
      horario_saida:F.horario_saida||null,
      horario_chegada:F.horario_chegada||null,
      tempo_trabalhado_min:(()=>{
        if(!F.horario_saida||!F.horario_chegada)return null;
        const[hs,ms]=F.horario_saida.split(':').map(Number);
        const[hc,mc]=F.horario_chegada.split(':').map(Number);
        const d=(hc*60+mc)-(hs*60+ms);
        return d>0?d:null;
      })(),
      valor_recarga_manual_motorista:ir&&parseFloat(F.valor_recarga_manual_motorista)>0?parseFloat(F.valor_recarga_manual_motorista):null,
      valor_recarga_manual_ajudante:ir&&parseFloat(F.valor_recarga_manual_ajudante)>0?parseFloat(F.valor_recarga_manual_ajudante):null,
      valor_motorista:ir?(parseFloat(F.valor_recarga_manual_motorista)>0?parseFloat(F.valor_recarga_manual_motorista):(tv2==='VAN'?50:70)):0,
      valor_ajudante1:ir&&F.ajudante1_nome?(parseFloat(F.valor_recarga_manual_ajudante)>0?parseFloat(F.valor_recarga_manual_ajudante):(tv2==='VAN'?50:60)):0,
      valor_ajudante2:ir&&F.ajudante2_nome?(parseFloat(F.valor_recarga_manual_ajudante)>0?parseFloat(F.valor_recarga_manual_ajudante):(tv2==='VAN'?50:60)):0,
    };
    try{

        toast('Registro atualizado!');

/* RECARGAS */
function Recargas(){
  const[rows,setRows]=useState([]);       // só recargas
  const[todasSaidas,setTodasSaidas]=useState([]); // 1ªs saídas do período
  const[ld,setLd]=useState(true);
  const[ini,setIni]=useState('2026-04-01');
  const[fim,setFim]=useState('2026-04-30');
  const[view,setView]=useState('timeline');
  const[pagamentos,setPagamentosState]=useState({});
  // Relatório do Dia
  const[dtDia,setDtDia]=useState(isoToday());

  function setPagamento(nome, pago){
    setPagamentosState(prev=>({...prev,[nome]:pago}));
    if(pago) toast('✅ '+nome.split(' ')[0]+' marcado como PAGO!');
    else toast('↩ '+nome.split(' ')[0]+' revertido para PENDENTE');
  }

  function isoToday(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

  useEffect(()=>{load()},[ini,fim]);

  async function load(){
    setLd(true);
    try{
      const todos=await db.get('entrada_diaria',{},{order:'data.asc,motorista_nome.asc'});
      const filtrados=todos.filter(r=>r.data>=ini&&r.data<=fim);
      setRows(filtrados.filter(r=>r.status_operacional==='Recarga'));
      setTodasSaidas(filtrados.filter(r=>r.status_operacional==='1ª Saída'));
    }catch(e){}
    setLd(false);
  }

  const fmtT=(s)=>{if(!s)return'—';const p=s.split(':');return`${p[0]}:${p[1]}`};
  const calcTempo=(s,c)=>{
    if(!s||!c)return'—';
    const[hs,ms]=s.split(':').map(Number);
    const[hc,mc]=c.split(':').map(Number);
    const d=(hc*60+mc)-(hs*60+ms);
    if(d<=0)return'—';
    return`${Math.floor(d/60)}h${String(d%60).padStart(2,'0')}m`;
  };

  // Montar TIMELINE por colaborador: 1ª saída + recargas
  const timeline=useMemo(()=>{
    const map={};
    // Adicionar 1ªs saídas
    todasSaidas.forEach(r=>{
      [r.motorista_nome,r.ajudante1_nome,r.ajudante2_nome].filter(Boolean).forEach(nome=>{
        const k=`${nome}|${r.data}`;
        if(!map[k])map[k]={nome,data:r.data,funcao:'',saida1:null,recargas:[]};
        if(nome===r.motorista_nome)map[k].funcao='MOTORISTA';
        else if(!map[k].funcao)map[k].funcao='AJUDANTE';
        map[k].saida1=r;
      });
    });
    // Adicionar recargas
    rows.forEach(r=>{
      [[r.motorista_nome,r.valor_motorista,'MOTORISTA'],[r.ajudante1_nome,r.valor_ajudante1,'AJUDANTE'],[r.ajudante2_nome,r.valor_ajudante2,'AJUDANTE']]
      .forEach(([nome,val,func])=>{
        if(!nome||!val)return;
        const k=`${nome}|${r.data}`;
        if(!map[k])map[k]={nome,data:r.data,funcao:func,saida1:null,recargas:[]};
        map[k].recargas.push({...r,valor:Number(val)||0});
      });
    });
    return Object.values(map).sort((a,b)=>a.data.localeCompare(b.data)||a.nome.localeCompare(b.nome));
  },[rows,todasSaidas]);

  // Resumo por colaborador (para totais de pagamento)
  const resumoPag=useMemo(()=>{
    const m={};
    rows.forEach(r=>{
      [[r.motorista_nome,r.valor_motorista],[r.ajudante1_nome,r.valor_ajudante1],[r.ajudante2_nome,r.valor_ajudante2]]
      .forEach(([n,v])=>{if(!n||!v)return;if(!m[n])m[n]={n,rc:0,t:0};m[n].rc++;m[n].t+=Number(v)||0});
    });
    return Object.values(m).sort((a,b)=>b.t-a.t);
  },[rows]);
  const tot=resumoPag.reduce((a,r)=>a+r.t,0);

  // ── EXCEL TIMELINE COMPLETO ─────────────────────────────
  function expExcel(){
    if(!rows.length){toast('Sem dados','err');return}
    const wb=XLSX.utils.book_new();
    const linhas=[];

    // Agrupa APENAS colaboradores com recarga
    const porColab={};
    timeline.filter(t=>t.recargas&&t.recargas.length>0).forEach(t=>{
      if(!porColab[t.nome])porColab[t.nome]={nome:t.nome,funcao:t.funcao,dias:[]};
      porColab[t.nome].dias.push(t);
    });

    Object.values(porColab).forEach(colab=>{
      // Linha do colaborador
      linhas.push({'':'','Colaborador':colab.nome,'Função':colab.funcao});
      colab.dias.forEach(dia=>{
        // 1ª Saída
        if(dia.saida1){
          const s=dia.saida1;
          linhas.push({
            '':'1ª SAÍDA','Colaborador':'','Função':'',
            'Data':fd(s.data),'Nº Transp':s.num_transporte||'','Placa':s.placa||'',
            'Rota':s.rota||'','Caixas':s.qtd_caixas||0,'Clientes':s.num_clientes||0,
            'Cubagem':parseFloat(s.cubos||0).toFixed(2),'KM':s.km||0,
            'Hor. Saída':fmtT(s.horario_saida),'Hor. Chegada':fmtT(s.horario_chegada),
            'Tempo':calcTempo(s.horario_saida,s.horario_chegada),
            'Valor Recarga':'—',
          });
        }
        // Recargas
        dia.recargas.forEach(r=>{
          linhas.push({
            '':'⟳ RECARGA','Colaborador':'','Função':'',
            'Data':fd(r.data),'Nº Transp':r.num_transporte||'','Placa':r.placa||'',
            'Rota':r.rota||'','Caixas':r.qtd_caixas||0,'Clientes':r.num_clientes||0,
            'Cubagem':parseFloat(r.cubos||0).toFixed(2),'KM':r.km||0,
            'Hor. Saída':fmtT(r.horario_saida),'Hor. Chegada':fmtT(r.horario_chegada),
            'Tempo':calcTempo(r.horario_saida,r.horario_chegada),
            'Valor Recarga':r.valor.toFixed(2),
            'Mot. Manual':r.valor_recarga_manual_motorista?'R$ '+parseFloat(r.valor_recarga_manual_motorista).toFixed(2):'',
            'Aj. Manual':r.valor_recarga_manual_ajudante?'R$ '+parseFloat(r.valor_recarga_manual_ajudante).toFixed(2):'',
            'Indicador':(r.valor_recarga_manual_motorista||r.valor_recarga_manual_ajudante)?'★ MANUAL':'PADRÃO',
          });
        });
      });
      linhas.push({'':'','Colaborador':'','Função':''});
    });

    const ws=XLSX.utils.json_to_sheet(linhas);
    ws['!cols']=[{wch:10},{wch:32},{wch:10},{wch:12},{wch:12},{wch:10},{wch:10},{wch:8},{wch:8},{wch:10},{wch:6},{wch:10},{wch:12},{wch:10},{wch:14},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'Timeline Recargas');

    // Aba resumo
    const wsR=XLSX.utils.json_to_sheet(resumoPag.map(r=>({'Colaborador':r.n,'Recargas':r.rc,'Total R$':r.t.toFixed(2)})));
    XLSX.utils.book_append_sheet(wb,wsR,'Resumo Pagamento');
    XLSX.writeFile(wb,`Recargas_Timeline_${ini}_${fim}.xlsx`);
    toast('Excel com timeline completa gerado!');
  }

  // ── PDF TIMELINE CORRIGIDO ──────────────────────────────
  function expPDFRec(){
    try{
      const comRec=timeline.filter(t=>t.recargas&&t.recargas.length>0);
      if(!comRec.length){toast('Nenhuma recarga no período','err');return;}
      if(!window.jspdf){toast('jsPDF não disponível','err');return;}
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF('landscape','mm','a4');
      const pW=297,pH=210;
      const s=function(v){return(v===null||v===undefined)?'':String(v);};
      const corR=[232,25,90],corB=[20,20,40],corG=[0,140,70],corA=[40,80,200];

      // AGRUPAR por colaborador único (não por data) — FIX do bug de duplicação
      const porColab={};
      comRec.forEach(function(t){
        if(!porColab[t.nome]){
          porColab[t.nome]={nome:t.nome,funcao:t.funcao,saidas:[],recargas:[]};
        }
        if(t.saida1)porColab[t.nome].saidas.push(t.saida1);
        t.recargas.forEach(function(r){porColab[t.nome].recargas.push(r);});
      });
      const colaboradores=Object.values(porColab);

      // ── CABEÇALHO ─────────────────────────────────────────
      doc.setFillColor(...corR);doc.rect(0,0,pW,18,'F');
      // Logo M (sem emoji)
      doc.setFillColor(255,255,255);doc.roundedRect(8,3,12,12,2,2,'F');
      doc.setTextColor(...corR);doc.setFontSize(11);doc.setFont('helvetica','bold');
      doc.text('M',11.5,12);
      // Nome empresa
      doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
      doc.text('MURICI LOGISTICA',26,10);
      doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('Plataforma de Gestão Operacional',26,15);
      // Título direita
      doc.setFontSize(11);doc.setFont('helvetica','bold');
      doc.text('RELATORIO DE RECARGAS',158,10);
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.text('Periodo: '+s(fd(ini))+' a '+s(fd(fim))+'   |   Gerado: '+new Date().toLocaleDateString('pt-BR'),158,15);

      let y=24;

      doc.text('RESUMO DE PAGAMENTO',12,y);y+=6;

      pagFilt.forEach(function(r,i){

        doc.setFont('helvetica','normal');doc.setTextColor(...corB);
        doc.text(s(r.n).substring(0,50),12,y);
        doc.text(s(r.funcao),145,y);
        doc.text(s(r.rc)+' recarga(s)',180,y);
        doc.setFont('helvetica','bold');doc.setTextColor(...corG);
        doc.text('R$ '+s(fmt(r.t,2)),240,y);
        y+=6;
      });
      doc.setDrawColor(...corR);doc.setLineWidth(0.4);doc.line(8,y,pW-8,y);y+=5;
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...corR);
      doc.text('TOTAL GERAL:',190,y);
      doc.setTextColor(...corG);doc.text('R$ '+s(fmt(tot,2)),240,y);
      y+=9;

      // ── DETALHAMENTO — 1 BLOCO POR COLABORADOR ─────────────
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...corR);
      doc.text('DETALHAMENTO POR COLABORADOR',8,y);y+=5;

      const cx=[8,24,40,62,80,95,108,117,128,140,154,170];
      const cn=['TIPO','DATA','N TRANSP','PLACA','ROTA','CX','KM','SAIDA','CHEGADA','TEMPO','VALOR'];

      colaboradores.forEach(function(c,ti){
        // Calcular altura necessária
        const linhas=c.saidas.length+c.recargas.length;
        const alturaBloco=10+7+linhas*6+4;
        if(y+alturaBloco>195){doc.addPage();y=15;}

        // Nome colaborador
        const corFundo=ti%2===0?[235,240,255]:[240,245,235];
        doc.setFillColor(...corFundo);doc.rect(8,y-3,pW-16,8,'F');
        doc.setDrawColor(200,210,230);doc.setLineWidth(0.2);doc.rect(8,y-3,pW-16,8,'S');
        doc.setFont('helvetica','bold');doc.setFontSize(8);
        // Sem emoji — usa prefixo texto
        const prefixo=c.funcao==='MOTORISTA'?'[MOT] ':'[AJU] ';
        doc.setTextColor(...(c.funcao==='MOTORISTA'?corA:corB));
        doc.text(prefixo+s(c.nome)+' - '+s(c.funcao),10,y+2);
        var totC=resumoPag.find(function(r){return r.n===c.nome;});
        doc.setTextColor(...corG);
        doc.text('Total: R$ '+s(fmt(totC?totC.t:0,2)),248,y+2);
        y+=10;

        // Header colunas
        doc.setFillColor(50,55,70);doc.rect(8,y-4,pW-16,7,'F');
        doc.setTextColor(255,255,255);doc.setFontSize(6.5);doc.setFont('helvetica','bold');
        cn.forEach(function(col,i){doc.text(col,cx[i],y);});
        y+=5;

        // Ordenar: 1ªs saídas e recargas por data
        var allR=[];
        c.saidas.forEach(function(r){allR.push({tipo:'1a SAIDA',r:r,valor:null,isRec:false});});
        c.recargas.forEach(function(r){allR.push({tipo:'RECARGA',r:r,valor:r.valor,isRec:true});});
        allR.sort(function(a,b){return a.r.data.localeCompare(b.r.data)||(!a.isRec?-1:1);});

        allR.forEach(function(item,idx){
          if(y>193){doc.addPage();y=15;}
          var isManual=item.isRec&&(parseFloat(item.r.valor_recarga_manual_motorista||0)>0||parseFloat(item.r.valor_recarga_manual_ajudante||0)>0);
          if(isManual){
            doc.setFillColor(255,243,200);doc.rect(8,y-3,pW-16,6,'F');
          }else if(idx%2===0){
            doc.setFillColor(252,253,255);doc.rect(8,y-3,pW-16,6,'F');
          }
          doc.setFont('helvetica','bold');doc.setFontSize(6.5);
          doc.setTextColor(...(item.isRec?corR:corA));
          doc.text(item.tipo+(isManual?' [MAN]':''),cx[0],y);
          doc.setFont('helvetica','normal');doc.setTextColor(...corB);
          doc.text(s(fd(item.r.data)),cx[1],y);
          doc.text(s(item.r.num_transporte),cx[2],y);
          doc.text(s(item.r.placa),cx[3],y);
          doc.text(s(item.r.rota),cx[4],y);
          doc.text(s(item.r.qtd_caixas),cx[5],y);
          doc.text(s(item.r.km),cx[6],y);
          doc.text(s(fmtT(item.r.horario_saida)),cx[7],y);
          doc.text(s(fmtT(item.r.horario_chegada)),cx[8],y);
          doc.text(s(calcTempo(item.r.horario_saida,item.r.horario_chegada)),cx[9],y);
          if(item.valor!=null){
            doc.setFont('helvetica','bold');
            doc.setTextColor(...(isManual?[200,130,0]:corG));
            doc.text('R$'+s(fmt(item.valor,0))+(isManual?' *':''),cx[10],y);
          }
          y+=6;
        });
        y+=4;
      });

      // ── RODAPÉ ────────────────────────────────────────────
      var totalPags=doc.internal.getNumberOfPages();
      for(var p=1;p<=totalPags;p++){
        doc.setPage(p);
        doc.setFillColor(245,245,248);doc.rect(0,pH-7,pW,7,'F');
        doc.setFontSize(6);doc.setFont('helvetica','normal');doc.setTextColor(150,150,160);
        doc.text('MURICI LOGÍSTICA - Plataforma de Gestão',8,pH-2);
        doc.text('Gerado: '+new Date().toLocaleString('pt-BR'),pW/2-20,pH-2);
        doc.text('Pag '+p+' / '+totalPags,pW-18,pH-2);
      }

      // Legenda [MAN] em todas as páginas
      for(var p2=1;p2<=totalPags;p2++){
        doc.setPage(p2);
        doc.setFillColor(255,243,200);doc.rect(8,pH-14,60,7,'F');
        doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(160,100,0);
        doc.text('[MAN] = Recarga com valor manual (sobrescreve padrao VAN/VUC)',10,pH-9);
      }
      doc.save('Recargas_'+s(ini)+'_'+s(fim)+'.pdf');
      toast('PDF gerado - '+colaboradores.length+' colab., '+totalPags+' pag.!');
    }catch(err){
      console.error('PDF ERRO:',err);
      toast('Erro: '+err.message,'err');
    }
  }

/* DESCARGA */
function Descarga(){
  const[rows,setRows]=useState([]);const[ld,setLd]=useState(true);
  const[dt,setDt]=useState(iso());
  const[dIni,setDIni]=useState(iso().substring(0,7)+'-01'); // primeiro dia do mês
  const[dFim,setDFim]=useState(iso()); // hoje
  const[usePeriod,setUsePeriod]=useState(false); // false=dia, true=período
  const[filtMat,setFiltMat]=useState('');
  const[modal,setModal]=useState(false);const[saving,setSaving]=useState(false);
  const[fr,setFr]=useState([]);
  const[motoristasLst,setMotoristasLst]=useState([]);
  const[modalCliente,setModalCliente]=useState(false);
  const[clienteEdit,setClienteEdit]=useState(null);
  const[savingCliente,setSavingCliente]=useState(false);
  const[buscaCliente,setBuscaCliente]=useState('');
  const[listaClientes,setListaClientes]=useState([]);
  const[viewClientes,setViewClientes]=useState(false);
  const[FC,setFC]=useState({matricula:'',razao_social:'',canal:'',territorio:'',gerencia:'',valor_pallet:''});
  const[buscandoMat,setBuscandoMat]=useState(false);
  // autocomplete nome por matrícula
  const[sugestoes,setSugestoes]=useState([]);
  // autocomplete busca por nome
  const[res,setRes]=useState([]);
  const[F,setF]=useState({
    data:iso(),placa:'',motorista_nome:'',num_transporte:'',rota:'',
    matricula_cliente:'',pesquisa_nome:'',razao_social:'',canal:'',
    territorio:'',gerencia:'',qtd_paletes:1,valor_pallet:0,obs:''
  });
  // Estado de busca ativa para período
  const[buscaAtiva,setBuscaAtiva]=useState({usePeriod:false,dt:iso(),dIni:iso().substring(0,7)+'-01',dFim:iso()});

  useEffect(()=>{loadR();loadFr();loadMotoristas()},[]);

  async function loadR(override){
    const cfg=override||buscaAtiva;
    setLd(true);
    try{
      let d;
      if(cfg.usePeriod){
        const todos=await db.get('descarga_lancamento',{},{order:'data.asc,created_at.desc'});
        d=todos.filter(r=>r.data>=cfg.dIni&&r.data<=cfg.dFim);
      }else{
        d=await db.get('descarga_lancamento',{data:cfg.dt},{order:'created_at.desc'});
      }
      setRows(d);
    }catch(e){}
    setLd(false);
  }

  function buscar(){
    const cfg={usePeriod,dt,dIni,dFim};
    setBuscaAtiva(cfg);
    loadR(cfg);
  }
  async function loadFr(){
    try{const d=await db.get('frota',{status:'ATIVO'},{select:'placa,tipo',order:'placa.asc'});setFr(d)}
    catch(e){}
  }
  async function loadMotoristas(){
    try{const d=await db.get('equipe',{funcao:'MOTORISTA',status:'ATIVO'},{select:'nome',order:'nome.asc'});setMotoristasLst(d)}
    catch(e){}
  }

  // Autocomplete MATRÍCULA → busca cliente
  async function onMatriculaChange(val){
    setF(f=>({...f,matricula_cliente:val,razao_social:'',canal:'',territorio:'',gerencia:'',valor_pallet:0}));
    if(val.length>=6){
      setBuscandoMat(true);
      try{
        const d=await db.get('descarga_ref',{matricula:val},{select:'matricula,razao_social,canal,territorio,gerencia,valor_pallet'});
        if(d&&d.length>0){
          const c=d[0];
          setF(f=>({...f,matricula_cliente:c.matricula,razao_social:c.razao_social,
            canal:c.canal,territorio:c.territorio,gerencia:c.gerencia,
            valor_pallet:c.valor_pallet,pesquisa_nome:c.razao_social}));
          setSugestoes([]);
        }
      }catch(e){}
      setBuscandoMat(false);
    }
  }

  // Autocomplete NOME → busca por nome parcial
  async function buscarPorNome(t){
    if(!t||t.length<3){setRes([]);return}
    try{const d=await db.get('descarga_ref',{},{ilike:{razao_social:t},limit:8});setRes(d)}
    catch(e){}
  }
  function selCliente(c){
    setF(f=>({...f,pesquisa_nome:c.razao_social,matricula_cliente:c.matricula,
      razao_social:c.razao_social,canal:c.canal,territorio:c.territorio,
      gerencia:c.gerencia,valor_pallet:c.valor_pallet}));
    setRes([]);
  }

  async function loadClientes(busca){
    try{
      const opts=busca&&busca.length>=2?{ilike:{razao_social:busca},limit:50}:{limit:50,order:'razao_social.asc'};
      const d=await db.get('descarga_ref',{},opts);
      setListaClientes(d||[]);
    }catch(e){}
  }

  async function salvarCliente(){
    if(!FC.matricula||!FC.razao_social){toast('Matrícula e Razão Social obrigatórios','err');return;}
    setSavingCliente(true);
    try{
      const payload={matricula:FC.matricula.trim(),razao_social:FC.razao_social.trim().toUpperCase(),canal:FC.canal||'A DEFINIR',territorio:FC.territorio||'A DEFINIR',gerencia:FC.gerencia||'A DEFINIR',valor_pallet:parseFloat(FC.valor_pallet)||0};
      if(clienteEdit){
        const r=await fetch(SURL+'/rest/v1/descarga_ref?matricula=eq.'+encodeURIComponent(FC.matricula),{method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify(payload)});
        if(!r.ok)throw new Error(await r.text());
        toast('Cliente atualizado!');
      }else{
        await db.post('descarga_ref',payload);
        toast('Cliente cadastrado!');
      }
      setModalCliente(false);setClienteEdit(null);loadClientes(buscaCliente);
    }catch(e){toast('Erro: '+e.message,'err')}
    setSavingCliente(false);
  }

  async function marcarReembolso(id, status){
    try{
      const payload={status_reembolso:status};
      if(status==='REEMBOLSADO')payload.data_reembolso=iso();
      else payload.data_reembolso=null;
      const r=await fetch(SURL+'/rest/v1/descarga_lancamento?id=eq.'+id,
        {method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify(payload)});
      if(!r.ok)throw new Error(await r.text());
      toast(status==='REEMBOLSADO'?'✅ Marcado como PAGO!':'↩ Revertido para PENDENTE');
      loadR();
    }catch(e){toast('Erro: '+e.message,'err')}
  }

  function abrirEditarCliente(c){
    setClienteEdit(c);
    setFC({matricula:c.matricula||'',razao_social:c.razao_social||'',canal:c.canal||'',territorio:c.territorio||'',gerencia:c.gerencia||'',valor_pallet:c.valor_pallet||''});
    setModalCliente(true);
  }

  async function salvar(){
    if(!F.placa){toast('Placa obrigatória','err');return}
    if(!F.motorista_nome){toast('Motorista obrigatório','err');return}
    setSaving(true);
    try{
      await db.post('descarga_lancamento',{
        ...F,
        qtd_paletes:parseInt(F.qtd_paletes)||1,
        valor_pallet:parseFloat(F.valor_pallet)||0,
        reembolsavel:!!(F.matricula_cliente)
      });
      toast('Descarga registrada!');setModal(false);loadR();
      setF(f=>({...f,placa:'',motorista_nome:'',num_transporte:'',rota:'',
        matricula_cliente:'',pesquisa_nome:'',razao_social:'',canal:'',
        territorio:'',gerencia:'',qtd_paletes:1,valor_pallet:0,obs:''}));
    }catch(e){toast('Erro: '+e.message,'err')}
    setSaving(false);
  }

  // ── EXCEL COMPLETO
  function expExcel(){
    if(!rowsFilt.length){toast('Sem dados','err');return}
    const ws=XLSX.utils.json_to_sheet(rowsFilt.map(r=>({
      'Data':fd(r.data),
      'Placa':r.placa||'',
      'Motorista':r.motorista_nome||'',
      'Nº Transporte':r.num_transporte||'',
      'Rota':r.rota||'',
      'Matrícula Cliente':r.matricula_cliente||'',
      'Razão Social / Cliente':r.razao_social||r.pesquisa_nome||'',
      'Canal':r.canal||'',
      'Território':r.territorio||'',
      'Gerência':r.gerencia||'',
      'Qtd Paletes':r.qtd_paletes||1,
      'Valor por Pallet (R$)':parseFloat(r.valor_pallet||0).toFixed(2),
      'Total (R$)':((r.qtd_paletes||1)*(r.valor_pallet||0)).toFixed(2),
      'Observações':r.obs||''

    // Cabeçalho

    doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text('MURICI LOGÍSTICA — DESCARGA FEMSA',14,10);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(`Data: ${fd(dt)}   |   Gerado em: ${new Date().toLocaleString('pt-BR')}`,14,15);

    // Totais
    const totR=rowsFilt.filter(r=>r.reembolsavel).reduce((a,r)=>a+(r.qtd_paletes||1)*(r.valor_pallet||0),0);
    const totN=rowsFilt.filter(r=>!r.reembolsavel).reduce((a,r)=>a+(r.qtd_paletes||1)*(r.valor_pallet||0),0);
    doc.setTextColor(0,0,0);doc.setFontSize(9);
    doc.setFillColor(240,255,248);doc.rect(14,19,120,10,'F');
    doc.setTextColor(0,160,100);doc.setFont('helvetica','bold');
    doc.text(`Reembolsável: R$ ${totR.toLocaleString('pt-BR',{minimumFractionDigits:2})}`,17,25);
    doc.setFillColor(255,240,240);doc.rect(138,19,100,10,'F');
    doc.setTextColor(200,30,60);
    doc.text(`Não Reembolsável: R$ ${totN.toLocaleString('pt-BR',{minimumFractionDigits:2})}`,141,25);
    doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');

    // Tabela cabeçalho
    const cols=['Data','Placa','Motorista','Nº Transp','Rota','Matrícula','Cliente','Canal','Paletes','Vl.Pallet','Total','Reemb.'];
    const xs=[14,28,40,73,88,100,118,165,185,194,208,224];
    let y=36;
    doc.setFillColor(40,40,60);doc.rect(14,y-5,pW-28,8,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
    cols.forEach((c,i)=>doc.text(c,xs[i],y));
    doc.setFont('helvetica','normal');doc.setFontSize(7);
    y+=6;

    rowsFilt.forEach((r,idx)=>{
      if(y>185){doc.addPage();y=15}
      if(idx%2===0){doc.setFillColor(248,248,255);doc.rect(14,y-4,pW-28,7,'F')}
      doc.setTextColor(20,20,40);
      const total=((r.qtd_paletes||1)*(r.valor_pallet||0));
      const vals=[
        fd(r.data),
        r.placa||'',
        (r.motorista_nome||'').substring(0,14),
        String(r.num_transporte||''),
        r.rota||'',
        r.matricula_cliente||'',
        (r.razao_social||r.pesquisa_nome||'').substring(0,22),
        (r.canal||'').substring(0,10),
        String(r.qtd_paletes||1),
        `R$${parseFloat(r.valor_pallet||0).toFixed(2)}`,
        `R$${total.toFixed(2)}`,
        r.reembolsavel?'SIM':'NÃO'
      ];
      vals.forEach((v,i)=>{
        if(i===11){doc.setTextColor(r.reembolsavel?0:200,r.reembolsavel?140:30,r.reembolsavel?60:60)}
        else doc.setTextColor(20,20,40);
        doc.text(String(v),xs[i],y);
      });
      y+=7;
    });

    // Totais finais
    y+=4;
    doc.setLineWidth(0.5);doc.setDrawColor(232,25,90);doc.line(14,y,pW-14,y);y+=6;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(232,25,90);
    const totGeral=totR+totN;
    doc.text(`TOTAL GERAL: R$ ${totGeral.toLocaleString('pt-BR',{minimumFractionDigits:2})}`,14,y);
    doc.text(`(${rowsFilt.length} registros)`,pW-50,y);

    doc.save(`Descarga_FEMSA_${dt}.pdf`);
    toast('PDF gerado com todos os campos!');
  }

/* RANKING DE INCENTIVOS */
function Ranking(){
  const[dados,setDados]=useState(null);const[ld,setLd]=useState(true);
  const[ini,setIni]=useState('2026-04-01');const[fim,setFim]=useState('2026-04-30');
  const[tipo,setTipo]=useState('MOTORISTA');

  useEffect(()=>{load()},[ini,fim,tipo]);

  async function load(){
    setLd(true);
    try{
      // Buscar equipe para usar funcao real do cadastro
      const equipeData=await db.get('equipe',{},{select:'nome,funcao'});
      const equipeMap={};
      equipeData.forEach(e=>{equipeMap[e.nome.trim()]=e.funcao});
      function getFuncaoReal(nome){return equipeMap[nome?.trim()]||null;}

      // Buscar todas as saídas do período
      const rows=await db.get('entrada_diaria',{},{order:'data.asc'});
      const filtradas=rows.filter(r=>r.data>=ini&&r.data<=fim);

      // Separar 1ª Saídas e Recargas
      const saidas=filtradas.filter(r=>r.status_operacional==='1ª Saída');
      const recargas=filtradas.filter(r=>r.status_operacional==='Recarga');

      // Calcular métricas por colaborador
      const mapa={};

      function addColaborador(nome,tipoFunc,tveiculo,isMotorista){
        if(!nome)return;
        // Usar funcao real do cadastro de equipe
        const funcaoReal=getFuncaoReal(nome)||tipoFunc;
        if(!mapa[nome])mapa[nome]={
          nome,funcao:funcaoReal,saidas:0,recargas:0,
          caixas:0,cubos:0,km:0,clientes:0,
          tempoMin:0,contTempos:0,
          pontualidades:[],van:0,vuc:0,
          caixasHora:[]
        };
        if(tveiculo==='VAN')mapa[nome].van++;
        else if(tveiculo==='VUC')mapa[nome].vuc++;
      }

      // Processar saídas
      saidas.forEach(s=>{
        // Motorista
        addColaborador(s.motorista_nome,'MOTORISTA',s.tipo_veiculo,true);
        if(s.motorista_nome&&mapa[s.motorista_nome]){
          const m=mapa[s.motorista_nome];
          m.saidas++;m.caixas+=s.qtd_caixas||0;
          m.cubos+=parseFloat(s.cubos)||0;m.km+=s.km||0;
          m.clientes+=s.num_clientes||0;
          // Horários
          if(s.horario_saida&&s.horario_chegada){
            const [hs,ms]=s.horario_saida.split(':').map(Number);
            const [hc,mc]=s.horario_chegada.split(':').map(Number);
            const diffMin=(hc*60+mc)-(hs*60+ms);
            if(diffMin>0){
              m.tempoMin+=diffMin;m.contTempos++;
              // Caixas por hora
              const hrs=diffMin/60;
              if(hrs>0)m.caixasHora.push((s.qtd_caixas||0)/hrs);
              // Pontualidade: VAN sai 06:30, VUC sai 07:00
              const limSaida=s.tipo_veiculo==='VAN'?390:420; // 06:30=390min, 07:00=420min
              const saidaMin=hs*60+ms;
              m.pontualidades.push(Math.max(0,100-Math.max(0,(saidaMin-limSaida))*5));
            }
          }
        }
        // Ajudantes
        [s.ajudante1_nome,s.ajudante2_nome].forEach(aj=>{
          if(!aj)return;
          addColaborador(aj,'AJUDANTE',s.tipo_veiculo,false);
          if(mapa[aj]){
            mapa[aj].saidas++;mapa[aj].caixas+=s.qtd_caixas||0;
            mapa[aj].cubos+=parseFloat(s.cubos)||0;
          }
        });
      });

      // Recargas
      recargas.forEach(s=>{
        if(s.motorista_nome&&mapa[s.motorista_nome])mapa[s.motorista_nome].recargas++;
        [s.ajudante1_nome,s.ajudante2_nome].forEach(aj=>{
          if(aj&&mapa[aj])mapa[aj].recargas++;
        });
      });

      // Calcular score final
      const lista=Object.values(mapa).filter(m=>m.funcao===tipo&&(m.saidas>0||m.recargas>0));
      lista.forEach(m=>{
        const pont=m.pontualidades.length>0?m.pontualidades.reduce((a,b)=>a+b,0)/m.pontualidades.length:50;
        const efic=m.caixasHora.length>0?m.caixasHora.reduce((a,b)=>a+b,0)/m.caixasHora.length:0;
        // Fator VAN: aplica 2.1x em caixas e cubos para equilibrar com VUC
        const isVAN=m.van>m.vuc;
        const fatorVan=isVAN?2.1:1.0;
        const caixasAjustadas=m.caixas*fatorVan;
        const cubosAjustados=m.cubos*fatorVan;
        m.pontMedia=pont;
        m.eficiencia=efic;
        m.tempoMedioMin=m.contTempos>0?Math.round(m.tempoMin/m.contTempos):0;
        m.isVAN=isVAN;
        // Score ponderado (VAN recebe fator 2.1x em volume/cubagem)
        m.score=Math.round(
          (pont*0.35) +                                    // 35% pontualidade
          (Math.min(m.saidas,30)/30*100*0.25) +            // 25% saídas
          (Math.min(m.recargas,10)/10*100*0.15) +          // 15% recargas
          (Math.min(caixasAjustadas,15000)/15000*100*0.15) + // 15% volume (ajustado VAN)
          (Math.min(efic,200)/200*100*0.10)                // 10% eficiência
        );
      });

      lista.sort((a,b)=>b.score-a.score);
      setDados(lista);
    }catch(e){console.error(e)}
    setLd(false);
  }

  const fmtTempo=(min)=>{if(!min)return'—';const h=Math.floor(min/60);const m=min%60;return`${h}h${String(m).padStart(2,'0')}m`};
  const medalha=(i)=>i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
  const corScore=(s)=>s>=80?'var(--grn)':s>=60?'var(--yel)':'var(--red)';

  return h('div',null,
    h('div',{className:'sh'},
      h('div',null,
        h('h1',{className:'st'},'Ranking de ',h('span',null,'Incentivos')),
        h('div',{className:'ss'},'Produtividade e pontualidade — atualizado diariamente')
      )
    ),

    // FILTROS
    h('div',{className:'fb'},
      h('div',{className:'fg2'},h('label',{className:'lbl'},'Início'),h('input',{type:'date',value:ini,onChange:e=>setIni(e.target.value),style:{width:150}})),
      h('div',{className:'fg2'},h('label',{className:'lbl'},'Fim'),h('input',{type:'date',value:fim,onChange:e=>setFim(e.target.value),style:{width:150}})),
      h('div',{className:'fg2'},
        h('label',{className:'lbl'},'Categoria'),
        h('select',{value:tipo,onChange:e=>setTipo(e.target.value),style:{width:160}},
          h('option',{value:'MOTORISTA'},'🚛 Motoristas'),
          h('option',{value:'AJUDANTE'},'👷 Ajudantes')
        )
      )
    ),

    ld?h(Ldg):!dados||dados.length===0?h(Emp,{i:'🏆',t:'Sem dados no período'}):
    h('div',null,

      // TOP 3 destaque
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12,marginBottom:20}},
        dados.slice(0,3).map((m,i)=>h('div',{key:m.nome,style:{
          background:i===0?'linear-gradient(135deg,#1a1600,#2a2000)':
                    i===1?'linear-gradient(135deg,#0d0d0d,#1a1a1a)':
                    'linear-gradient(135deg,#0d0a00,#1a1200)',
          border:`1px solid ${i===0?'#f5a62340':i===1?'#ffffff20':'#cd7f3240'}`,
          borderRadius:12,padding:'18px 16px',textAlign:'center'
        }},
          h('div',{style:{fontSize:32,marginBottom:4}},medalha(i)),
          h('div',{style:{fontSize:14,fontWeight:800,color:'var(--t1)',marginBottom:6}},m.nome.split(' ').slice(0,2).join(' ')),
          h('div',{style:{fontSize:28,fontWeight:900,color:corScore(m.score),fontFamily:"'JetBrains Mono',monospace",marginBottom:8}},`${m.score}pts`),
          h('div',{style:{display:'flex',justifyContent:'center',gap:8,flexWrap:'wrap',fontSize:10,color:'var(--t3)'}},
            h('span',null,`${m.saidas} saídas`),
            h('span',null,'·'),
            h('span',null,`${fmt(m.caixas)} cx`),
            h('span',null,'·'),
            h('span',null,`${Math.round(m.pontMedia)}% pont.`)
          )
        ))
      ),

      // TABELA COMPLETA
      h('div',{className:'card'},
        h('div',{className:'ch'},
          h('span',{className:'ct'},`🏅 Ranking Completo — ${tipo==='MOTORISTA'?'Motoristas':'Ajudantes'}`),
          h('span',{style:{fontSize:11,color:'var(--t3)'}},`${dados.length} colaboradores`)
        ),
        h('div',{className:'tw'},
          h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,'#'),h('th',null,'Nome'),h('th',null,'VAN/VUC'),
              h('th',null,'Saídas'),h('th',null,'Recargas'),
              h('th',null,'Caixas'),h('th',null,'Cubos'),
              h('th',null,'Tempo Médio'),h('th',null,'Cx/Hora'),
              h('th',{style:{color:'var(--yel)'}},'Pontualidade'),
              h('th',{style:{color:'var(--grn)'}},'SCORE')
            )),
            h('tbody',null,
              dados.map((m,i)=>h('tr',{key:m.nome,style:i<3?{background:'var(--s2)'}:{}},
                h('td',{style:{fontWeight:700,color:i===0?'#f5a623':i===1?'#aaa':i===2?'#cd7f32':'var(--t3)',fontSize:i<3?18:14}},
                  medalha(i)||(i+1)),
                h('td',{className:'b'},m.nome.split(' ').slice(0,3).join(' ')),
                h('td',null,
                  m.van>0?h('span',{className:'badge bb',style:{marginRight:3}},`VAN ${m.van}`):null,
                  m.vuc>0?h('span',{className:'badge bg'},`VUC ${m.vuc}`):null
                ),
                h('td',{className:'m',style:{color:'var(--t1)',fontWeight:600}},m.saidas),
                h('td',{className:'m'},m.recargas||'—'),

/* DESPESAS / REEMBOLSO */
function Despesas(){
  const[rows,setRows]=useState([]);const[ld,setLd]=useState(true);
  const[modal,setModal]=useState(false);const[saving,setSaving]=useState(false);
  const[ini,setIni]=useState(iso().substring(0,7)+'-01');
  const[fim,setFim]=useState(iso());
  const[motoristas,setMotoristas]=useState([]);
  const[F,setF]=useState({data:iso(),num_transporte:'',rota:'',motorista_nome:'',categoria:'',descricao:'',valor:'',num_nf:'',status:'PENDENTE'});

  useEffect(()=>{load();loadMotoristas()},[ini,fim]);

  async function load(){
    setLd(true);
    try{
      const d=await db.get('despesas',{},{order:'data.desc,created_at.desc'});
      setRows(d.filter(r=>r.data>=ini&&r.data<=fim));
    }catch(e){}
    setLd(false);
  }

  async function loadMotoristas(){
    try{
      const d=await db.get('equipe',{status:'ATIVO'},{order:'nome.asc',select:'nome,funcao'});
      setMotoristas(d);
    }catch(e){}
  }

  async function salvar(){
    if(!F.categoria){toast('Selecione a categoria','err');return}
    if(!F.valor||parseFloat(F.valor)<=0){toast('Informe o valor','err');return}
    setSaving(true);
    try{
      const payload={...F,valor:parseFloat(F.valor)||0,data:F.data||iso()};
      if(F.id)await db.patch('despesas',F.id,payload);
      else await db.post('despesas',payload);
      toast('Despesa salva!');setModal(false);load();
    }catch(e){toast('Erro: '+e.message,'err')}
    setSaving(false);
  }

  async function marcarStatus(id,status){
    try{await db.patch('despesas',id,{status});load();toast(status==='REEMBOLSADO'?'✅ Reembolsado!':'↩ Revertido');}catch(e){}
  }

  async function excluir(id){

    if(!rows.length){toast('Sem dados','err');return}

      'Data':fd(r.data),'Motorista':r.motorista_nome||'—','Nº Transporte':r.num_transporte||'—',

/* GESTÃO DE MANUTENÇÃO */
function GestaoManutencao(){
  const[aba,setAba]=useState('ativas');
  const[os,setOs]=useState([]);
  const[hist,setHist]=useState([]);
  const[frota,setFrota]=useState([]);
  const[ld,setLd]=useState(true);
  const[ldH,setLdH]=useState(false);
  const[modalOS,setModalOS]=useState(false);
  const[saving,setSaving]=useState(false);
  const[F,setF]=useState({placa:'',data_entrada:iso(),km_entrada:'',oficina:'',observacoes:''});
  const[osAtual,setOsAtual]=useState(null);
  const[itens,setItens]=useState([]);
  const[ldItens,setLdItens]=useState(false);
  const[FI,setFI]=useState({tipo:'peca',descricao:'',quantidade:'1',data_troca:iso()});
  const[savingItem,setSavingItem]=useState(false);
  const[osRetorno,setOsRetorno]=useState(null);
  const[FR,setFR]=useState({data_retorno:iso(),km_retorno:'',obs:''});
  const[savingR,setSavingR]=useState(false);
  const[analises,setAnalises]=useState(null);
  const[ldA,setLdA]=useState(false);
  const[filtPlaca,setFiltPlaca]=useState('');
  const[osExpandida,setOsExpandida]=useState(null);
  const[itensHist,setItensHist]=useState({});

  useEffect(()=>{loadAtivas()},[]);
  useEffect(()=>{if(aba==='historico')loadHist();else if(aba==='analises')loadAnalises();},[aba]);

  async function loadAtivas(){
    setLd(true);
    try{
      const[d,fr]=await Promise.all([
        db.get('manutencao_os',{status:'ABERTO'},{order:'data_entrada.asc'}),
        db.get('frota',{},{select:'placa,tipo',order:'placa.asc'})
      ]);
      setOs(d);setFrota(fr);
    }catch(e){toast('Erro ao carregar','err')}
    setLd(false);
  }

  async function loadHist(){
    setLdH(true);
    try{const d=await db.get('manutencao_os',{},{order:'data_entrada.desc',limit:200});setHist(d)}catch(e){}
    setLdH(false);
  }

  async function loadAnalises(){
    setLdA(true);
    try{
      const[allOs,allItens]=await Promise.all([
        db.get('manutencao_os',{},{order:'data_entrada.desc'}),
        db.get('manutencao_itens',{},{order:'created_at.desc'})
      ]);
      const byPlaca={};
      allOs.forEach(o=>{
        if(!byPlaca[o.placa])byPlaca[o.placa]={placa:o.placa,total:0,conc:0,dias:0};
        byPlaca[o.placa].total++;
        if(o.status==='CONCLUIDO'&&o.data_entrada&&o.data_retorno){
          byPlaca[o.placa].conc++;
          byPlaca[o.placa].dias+=Math.round((new Date(o.data_retorno)-new Date(o.data_entrada))/86400000);
        }
      });
      const topPlacas=Object.values(byPlaca).sort((a,b)=>b.total-a.total).slice(0,8).map(v=>({...v,dm:v.conc>0?Math.round(v.dias/v.conc):null}));
      const byPeca={};
      allItens.filter(i=>i.tipo==='peca').forEach(i=>{
        const k=i.descricao.trim().toUpperCase();
        if(!byPeca[k])byPeca[k]={desc:k,qtd:0,veic:new Set()};
        byPeca[k].qtd+=(i.quantidade||1);
        byPeca[k].veic.add(i.placa);
      });
      const topPecas=Object.values(byPeca).sort((a,b)=>b.qtd-a.qtd).slice(0,10).map(v=>({...v,veic:v.veic.size}));
      setAnalises({topPlacas,topPecas,totalOs:allOs.length,conc:allOs.filter(o=>o.status==='CONCLUIDO').length,totalItens:allItens.length});
    }catch(e){toast('Erro nas análises','err')}
    setLdA(false);
  }

  async function loadItens(osId){
    setLdItens(true);
    try{const d=await db.get('manutencao_itens',{os_id:osId},{order:'created_at.asc'});setItens(d)}catch(e){}
    setLdItens(false);
  }

  async function loadItensHist(osId){
    if(itensHist[osId]!==undefined)return;
    try{
      const d=await db.get('manutencao_itens',{os_id:osId},{order:'created_at.asc'});
      setItensHist(prev=>({...prev,[osId]:d}));
    }catch(e){setItensHist(prev=>({...prev,[osId]:[]}))}
  }

  async function criarOS(){
    if(!F.placa){toast('Selecione a placa','err');return}
    setSaving(true);
    try{
      await db.post('manutencao_os',{placa:F.placa,data_entrada:F.data_entrada,oficina:F.oficina||null,km_entrada:F.km_entrada?parseInt(F.km_entrada):null,status:'ABERTO',observacoes:F.observacoes||null});
      await db.patchWhere('frota','placa',F.placa,{status:'MANUTENCAO'});
      toast('OS criada!');
      setModalOS(false);
      setF({placa:'',data_entrada:iso(),km_entrada:'',oficina:'',observacoes:''});
      loadAtivas();
    }catch(e){toast('Erro: '+e.message,'err')}
    setSaving(false);
  }

  async function addItem(){
    if(!FI.descricao.trim()){toast('Descrição obrigatória','err');return}
    setSavingItem(true);
    try{
      await db.post('manutencao_itens',{os_id:osAtual.id,placa:osAtual.placa,tipo:FI.tipo,descricao:FI.descricao.trim(),quantidade:parseInt(FI.quantidade)||1,data_troca:FI.data_troca||null});
      toast('Item adicionado!');
      setFI({tipo:'peca',descricao:'',quantidade:'1',data_troca:iso()});
      loadItens(osAtual.id);
    }catch(e){toast('Erro: '+e.message,'err')}
    setSavingItem(false);
  }

  async function delItem(id){
    if(!confirm('Remover este item?'))return;
    try{
      const r=await fetch(`${SURL}/rest/v1/manutencao_itens?id=eq.${id}`,{method:'DELETE',headers:HDR});
      if(!r.ok)throw new Error(await r.text());
      toast('Removido!');
      loadItens(osAtual.id);
    }catch(e){toast('Erro','err')}
  }

  async function registrarRetorno(){
    if(!FR.data_retorno){toast('Data de retorno obrigatória','err');return}
    setSavingR(true);
    try{
      const obsAtual=osRetorno.observacoes||'';
      const obsFinal=FR.obs?(obsAtual?obsAtual+'\nRetorno: '+FR.obs:'Retorno: '+FR.obs):obsAtual;
      await db.patch('manutencao_os',osRetorno.id,{data_retorno:FR.data_retorno,km_retorno:FR.km_retorno?parseInt(FR.km_retorno):null,status:'CONCLUIDO',observacoes:obsFinal||null});
      await db.patchWhere('frota','placa',osRetorno.placa,{status:'ATIVO'});
      toast(`${osRetorno.placa} retornou!`);
      setOsRetorno(null);
      setFR({data_retorno:iso(),km_retorno:'',obs:''});
      loadAtivas();
    }catch(e){toast('Erro: '+e.message,'err')}
    setSavingR(false);
  }

  const calcDias=d=>Math.floor((new Date()-new Date(d))/86400000);
  const corDias=d=>d>=30?'var(--red)':d>=20?'var(--yel)':d>=10?'#f97316':'var(--blu)';
  const bgDias=d=>d>=30?'var(--rbg)':d>=20?'var(--ybg)':d>=10?'rgba(249,115,22,0.1)':'var(--bbg)';
  const medal=i=>i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'';
  const histFilt=hist.filter(o=>!filtPlaca||o.placa.toLowerCase().includes(filtPlaca.toLowerCase()));
  const TabBtn=(t,lbl)=>h('button',{key:t,onClick:()=>setAba(t),style:{padding:'10px 18px',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.5,background:'transparent',border:'none',cursor:'pointer',color:aba===t?'var(--red)':'var(--t3)',borderBottom:`2px solid ${aba===t?'var(--red)':'transparent'}`,fontFamily:'Inter,sans-serif',transition:'all .2s'}},lbl);

  return h('div',null,
    h('div',{className:'sh'},
      h('div',null,h('h1',{className:'st'},'Gestão de ',h('span',null,'Manutenção')),h('div',{className:'ss'},`${os.length} veículo${os.length!==1?'s':''} em manutenção`)),
      h('button',{className:'btn btn-r',onClick:()=>setModalOS(true)},'+ Novo Envio')
    ),
    aba==='ativas'&&h('div',{className:'kg'},
      h('div',{className:'kc y'},h('div',{className:'kl'},'Em Manutenção'),h('div',{className:'kv'},os.length)),
      h('div',{className:'kc r'},h('div',{className:'kl'},'Críticos >20d'),h('div',{className:'kv'},os.filter(o=>calcDias(o.data_entrada)>=20).length)),
      h('div',{className:'kc b'},h('div',{className:'kl'},'Dias Médios'),h('div',{className:'kv'},os.length>0?Math.round(os.reduce((a,o)=>a+calcDias(o.data_entrada),0)/os.length):0)),
      h('div',{className:'kc g'},h('div',{className:'kl'},'Frota Disponível'),h('div',{className:'kv'},frota.length-os.length))
    ),
    h('div',{style:{display:'flex',borderBottom:'1px solid var(--b2)',marginBottom:20}},
      TabBtn('ativas',`🔧 Ativas (${os.length})`),TabBtn('historico','📋 Histórico'),TabBtn('analises','📊 Análises')
    ),
    aba==='ativas'&&(
      ld?h(Ldg):os.length===0?h(Emp,{i:'✅',t:'Nenhum veículo em manutenção'}):
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},os.map(o=>{
        const dias=calcDias(o.data_entrada);
        return h('div',{key:o.id,className:'card',style:{borderLeft:`3px solid ${corDias(dias)}`}},
          h('div',{className:'ch'},
            h('div',{style:{display:'flex',alignItems:'center',gap:12}},
              h('span',{style:{fontSize:16,fontWeight:800,color:'var(--t1)',fontFamily:"'JetBrains Mono',monospace"}},o.placa),
              h('span',{className:'badge',style:{background:bgDias(dias),color:corDias(dias),border:`1px solid ${corDias(dias)}40`}},`${dias} dias na oficina`)
            ),
            h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn btn-o btn-sm',onClick:()=>{setOsAtual(o);setItens([]);setFI({tipo:'peca',descricao:'',quantidade:'1',data_troca:iso()});loadItens(o.id)}},'📦 Itens / Peças'),
              h('button',{className:'btn btn-g btn-sm',onClick:()=>{setOsRetorno(o);setFR({data_retorno:iso(),km_retorno:'',obs:''})}},'✓ Retornou')
            )

            o.observacoes&&h('div',{style:{gridColumn:'1/-1'}},h('div',{className:'kl'},'Observações'),h('div',{style:{fontSize:11,color:'var(--t2)',lineHeight:1.5}},o.observacoes))

        )

    aba==='historico'&&(

        h('div',{className:'fb'},h('div',{className:'fg2'},h('label',{className:'lbl'},'Filtrar Placa'),h('input',{type:'text',placeholder:'Ex: ABC1234',value:filtPlaca,onChange:e=>setFiltPlaca(e.target.value),style:{width:160}}))),

            h('button',{className:'btn btn-r btn-sm',onClick:addItem,disabled:savingItem,style:{marginTop:4}},savingItem?'Adicionando...':'+ Adicionar')
          ),
          h('div',{className:'ct',style:{marginBottom:8}},'Itens registrados nesta OS'),
          ldItens?h(Ldg):itens.length===0?h('div',{style:{color:'var(--t3)',fontSize:12,padding:'10px 0'}},'Nenhum item ainda. Adicione peças e serviços acima.'):
          h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
            itens.map(i=>h('div',{key:i.id,style:{background:'var(--s3)',border:'1px solid var(--b2)',borderRadius:6,padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
                h('span',{className:`badge ${i.tipo==='peca'?'bb':'bg'}`,style:{fontSize:9}},i.tipo==='peca'?'Peça':'Serv.'),
                h('span',{style:{color:'var(--t1)',fontWeight:600,fontSize:13}},i.descricao),
                i.quantidade>1&&h('span',{style:{color:'var(--t3)',fontSize:11}},`×${i.quantidade}`),
                i.data_troca&&h('span',{style:{color:'var(--t3)',fontSize:10}},fd(i.data_troca))
              ),
              h('button',{onClick:()=>delItem(i.id),style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--red)',fontSize:15,padding:'0 4px',lineHeight:1}},'✕')
            ))
          )
        ),
        h('div',{className:'mf'},h('button',{className:'btn btn-r',onClick:()=>setOsAtual(null)},'✓ Fechar'))
      )
    ),
    osRetorno&&h('div',{className:'ov'},
      h('div',{className:'mod'},
        h('div',{className:'mh'},
          h('div',null,h('div',{className:'mt'},`✓ Retorno — ${osRetorno.placa}`),h('div',{style:{fontSize:11,color:'var(--t3)',marginTop:3}},`${calcDias(osRetorno.data_entrada)} dias na oficina`)),
          h('button',{className:'btn btn-o btn-xs',onClick:()=>setOsRetorno(null)},'✕')
        ),
        h('div',{className:'mb'},
          h('div',{className:'r2'},
            h('div',{className:'fg'},h('label',{className:'lbl'},'Data de Retorno'),h('input',{type:'date',value:FR.data_retorno,onChange:e=>setFR(f=>({...f,data_retorno:e.target.value}))})),
            h('div',{className:'fg'},h('label',{className:'lbl'},'KM Retorno'),h('input',{type:'number',placeholder:'Ex: 46200',value:FR.km_retorno,onChange:e=>setFR(f=>({...f,km_retorno:e.target.value}))}))
          ),
          h('div',{className:'fg'},h('label',{className:'lbl'},'Observações Finais'),h('textarea',{value:FR.obs,onChange:e=>setFR(f=>({...f,obs:e.target.value})),placeholder:'Ex: Pendências, garantia, próxima revisão...'}))
        ),
        h('div',{className:'mf'},h('button',{className:'btn btn-o',onClick:()=>setOsRetorno(null)},'Cancelar'),h('button',{className:'btn btn-r',onClick:registrarRetorno,disabled:savingR},savingR?'Salvando...':'✓ Confirmar Retorno'))
      )
    )
  )
}

const PAGES={dashboard:Dashboard,entrada:EntradaDia,liberacoes:Liberacoes,descarga:Descarga,frota:Frota,equipe:Equipe,escala:Escala,recargas:Recargas,ranking:Ranking,despesas:Despesas,manutencao:GestaoManutencao};

function App(){
  const[page,setPage]=useState('liberacoes');
  const Page=PAGES[page];
  return h('div',{className:'app'},
    h('div',{className:'topbar'},
      h('div',{className:'logo'},h('div',{className:'logo-icon'},'M'),h('div',null,h('div',{className:'logo-text'},'Transportadora'),h('div',{className:'logo-sub'},'Gestão Operacional'))),
      h('div',{style:{fontSize:11,color:'var(--t3)',fontFamily:"'JetBrains Mono',monospace"}},dstr())
    ),
    h('div',{className:'nav'},NAV.map(({k,l})=>h('button',{key:k,className:`nav-btn${page===k?' on':''}`,onClick:()=>setPage(k)},l))),
    h('div',{className:'main'},h(Page,{key:page}))
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
